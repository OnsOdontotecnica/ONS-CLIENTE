<body>
<div class="app-container" id="appContainer">
    
    <!-- TELA DE LOGIN -->
    <div id="loginArea" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <h1>ONS</h1>
                <div class="logo-accent">OdontoTecnica</div>
                <p style="font-size:0.7rem; color:#5a6e7a; margin-top:4px;">Manutencao de Qualidade</p>
            </div>
            <div class="field-group">
                <label>Clinica / Consultorio</label>
                <input type="text" id="loginClinica" placeholder="Ex: Sorriso Odonto" autocomplete="off">
            </div>
            <div class="field-group">
                <label>Telefone (com DDD)</label>
                <input type="tel" id="loginTelefone" placeholder="(11) 91234-5678" autocomplete="off">
            </div>
            <button class="btn-primary" id="btnLogin" onclick="fazerLogin()">Acessar Sistema</button>
        </div>
    </div>

    <!-- SISTEMA PRINCIPAL -->
    <div id="mainSystem" class="hidden">
        <div class="header">
            <div class="logo-area">
                <div class="logo-title">
                    <h1>ONS ODONTOTECNICA</h1>
                    <p>Acompanhamento de Ordens de Serviço</p>
                </div>
                <div class="user-info">
                    <span id="displayNomeClinica"></span>
                    <button class="logout-btn" id="logoutBtn" onclick="logout()">Sair</button>
                </div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="tabNovaOS" onclick="mudarAba('tabNovaOS')">Nova OS</button>
            <button class="tab-btn" data-tab="tabRelatorios" onclick="mudarAba('tabRelatorios')">Relatórios</button>
        </div>

        <div id="tabNovaOS" class="tab-content active">
            <div class="card">
                <div class="field-group">
                    <label>Equipamento</label>
                    <select id="equipamentoSelect">
                        <option value="">Selecione um equipamento</option>
                        <option>Cadeira Odontologica</option>
                        <option>Caneta Alta Rotacao</option>
                        <option>Caneta Baixa Rotacao</option>
                        <option>Micromotor Eletrico</option>
                        <option>Ultrassom Odontologico</option>
                        <option>Jato de Bicarbonato</option>
                        <option>Compressor</option>
                        <option>Aspirador / Suctora</option>
                        <option>Fotopolimerizadora</option>
                        <option>Raio-X Intraoral</option>
                        <option>Autoclave</option>
                        <option>Motor de Endodontia</option>
                        <option>Seladora</option>
                        <option>Seringa Triplice</option>
                        <option>Outros</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Observacao do equipamento</label>
                    <textarea id="obsEquipamento" rows="2" placeholder="Caso nao esteja na lista ou detalhes adicionais..."></textarea>
                </div>

                <div class="field-group">
                    <label>Prioridade</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Alta"> Alta (parado)</label>
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Media"> Media (falhas)</label>
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Baixa"> Baixa (preventiva)</label>
                    </div>
                </div>

                <div class="field-group">
                    <label>Agendar Servicos Extra</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" id="servHigGeral"> Higienizacao geral</label>
                        <label class="checkbox-item"><input type="checkbox" id="servHigTecnica"> Higienizacao tecnica</label>
                    </div>
                    <div class="field-group" style="margin-top: 10px;">
                        <label>Data agendada para servico extra</label>
                        <input type="date" id="dataAgendamento" style="font-size:0.85rem;">
                    </div>
                    <small class="hint">Geral: limpeza caixa d'agua/filtros de detritos/ Tecnica: ar condicionado, sanitizacao</small>
                </div>

                <div class="field-group">
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" id="incluirLaudo"> Incluir laudo tecnico</label>
                    </div>
                </div>

                <div class="field-group">
                    <label>Observacoes gerais da OS</label>
                    <textarea id="observacoesGerais" rows="2" placeholder="Informacoes adicionais..."></textarea>
                </div>

                <button class="btn-primary" id="btnCriarOS" onclick="criarOS()">Criar Ordem de Servico</button>
                <button class="btn-secondary" id="btnWhatsAppRapido" onclick="enviarUltimaOS()">Enviar emergencia via WhatsApp</button>
            </div>
        </div>

        <div id="tabRelatorios" class="tab-content">
            <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                <button class="btn-reload" id="btnRecarregarOS" onclick="carregarOS()">🔄 Recarregar</button>
            </div>
            <div id="listaOSContainer"></div>
        </div>

        <div class="footer">
            ONS OdontoTecnica - Manutencao de Equipamentos Odontologicos
        </div>
    </div>
</div>

<script>                         
    const SUPABASE_URL = 'https://vckyxwonbpkdeqeoswxc.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZja3l4d29uYnBrZGVxZW9zd3hjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMTY5NjMsImV4cCI6MjA5MTU5Mjk2M30.b5ni_vnIETHVuOs5Cy4982UUBq9Icm-Zc12W1FwQyvI';
    let supabaseClient = null;
    let ordensServico = [];
    let usuarioAtual = null;

    // Inicializar Supabase
    try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        console.log("✅ Supabase inicializado com sucesso!");
    } catch(err) {
        console.error("❌ Erro ao iniciar Supabase:", err);
        alert("Erro ao conectar com o servidor.");
    }

    // FUNÇÃO PARA MUDAR ABA
    function mudarAba(abaId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(abaId).classList.add('active');
        
        if(abaId === 'tabNovaOS') {
            document.querySelector('.tab-btn[data-tab="tabNovaOS"]').classList.add('active');
        } else {
            document.querySelector('.tab-btn[data-tab="tabRelatorios"]').classList.add('active');
            carregarOS();
        }
    }

    // FUNÇÃO DE LOGIN
    function fazerLogin() {
        console.log("🔵 Botão login clicado!");
        
        const clinica = document.getElementById('loginClinica').value.trim();
        const telefone = document.getElementById('loginTelefone').value.trim();
        
        if(!clinica || !telefone) { 
            alert("Preencha o nome da clínica e o telefone."); 
            return; 
        }
        
        usuarioAtual = { clinicaNome: clinica, telefone: telefone };
        localStorage.setItem('ons_usuario', JSON.stringify(usuarioAtual));
        
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('mainSystem').classList.remove('hidden');
        document.getElementById('displayNomeClinica').innerHTML = clinica + '<br><small>' + telefone + '</small>';
        
        carregarOS();
        alert("✅ Login realizado com sucesso!");
    }
    
    // FUNÇÃO DE LOGOUT
    function logout() {
        usuarioAtual = null;
        localStorage.removeItem('ons_usuario');
        document.getElementById('loginArea').classList.remove('hidden');
        document.getElementById('mainSystem').classList.add('hidden');
        document.getElementById('loginClinica').value = '';
        document.getElementById('loginTelefone').value = '';
    }

    // FUNÇÃO PARA CARREGAR OS
    async function carregarOS() {
        if(!usuarioAtual) return;
        if(!supabaseClient) return;
        
        const container = document.getElementById('listaOSContainer');
        if(container) container.innerHTML = '<div class="loading">Carregando...</div>';
        
        try {
            const { data, error } = await supabaseClient
                .from('chamados')
                .select('*')
                .eq('clinica', usuarioAtual.clinicaNome)
                .order('created_at', { ascending: false });
           
            if(error) {
                console.error("Erro ao carregar:", error);
                if(container) container.innerHTML = '<div class="loading">Erro ao carregar OS.</div>';
                return;
            }
            
            ordensServico = data || [];
            renderRelatorios();
        } catch(err) {
            console.error("Erro:", err);
            if(container) container.innerHTML = '<div class="loading">Erro de conexão.</div>';
        }
    }

    // FUNÇÃO PARA CRIAR OS
    async function criarOS() {
        if(!usuarioAtual) {
            alert("Faça login primeiro!");
            return;
        }
        
        if(!supabaseClient) {
            alert("Erro de conexão com o servidor.");
            return;
        }
        
        const btn = document.getElementById('btnCriarOS');
        if(btn) {
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";
        }

        try {
            let eqBase = document.getElementById('equipamentoSelect').value;
            let obsEquip = document.getElementById('obsEquipamento').value;
            let equipamentoFinal = obsEquip.trim() !== "" ? (eqBase ? eqBase + ' (' + obsEquip + ')' : obsEquip) : eqBase;
            if(!equipamentoFinal) equipamentoFinal = "Não informado";
            
            let prioridades = [];
            document.querySelectorAll('input[name="prioridade"]:checked').forEach(cb => prioridades.push(cb.value));
            let prioridadeTxt = prioridades.length ? prioridades.join(', ') : "Normal";
            
            let incluirLaudo = document.getElementById('incluirLaudo').checked ? true : false;
            let observacoesGerais = document.getElementById('observacoesGerais').value || "---";
            
            let dataAgendamento = document.getElementById('dataAgendamento').value;
            let dataFinal = (dataAgendamento && dataAgendamento !== "") ? dataAgendamento : null;

            const novaOS = {
                clinica: usuarioAtual.clinicaNome,
                telefone_cliente: usuarioAtual.telefone,
                equipamento: equipamentoFinal,
                prioridade: prioridadeTxt,
                detalhe: observacoesGerais,
                status: 'Em andamento',
                incluirlaudo: incluirLaudo,
                created_at: new Date().toISOString(),
                data_agendamento: dataFinal
            };

            console.log("📤 Enviando OS:", novaOS);

            const { data, error } = await supabaseClient
                .from('chamados')
                .insert([novaOS])
                .select();

            if (error) {
                console.error("❌ Erro:", error);
                throw error;
            }

            alert("✅ Ordem de Serviço criada com sucesso!");
            
            // Limpar formulário
            document.getElementById('equipamentoSelect').value = "";
            document.getElementById('obsEquipamento').value = "";
            document.getElementById('observacoesGerais').value = "";
            document.getElementById('dataAgendamento').value = "";
            document.getElementById('incluirLaudo').checked = false;
            document.querySelectorAll('input[name="prioridade"]:checked').forEach(cb => cb.checked = false);
            document.getElementById('servHigGeral').checked = false;
            document.getElementById('servHigTecnica').checked = false;
            
            await carregarOS();
            
            // Mudar para aba de relatórios
            const tabRelatorios = document.querySelector('.tab-btn[data-tab="tabRelatorios"]');
            if(tabRelatorios) tabRelatorios.click();
            
        } catch (err) {
            console.error("❌ Erro:", err);
            alert("Erro ao criar OS: " + err.message);
        } finally {
            if(btn) {
                btn.disabled = false;
                btn.innerText = "Criar Ordem de Servico";
            }
        }
    }

    // FUNÇÃO PARA ATUALIZAR STATUS
    async function atualizarStatus(id, novoStatus) {
        if(!supabaseClient) return;
        
        try {
            const { error } = await supabaseClient
                .from('chamados')
                .update({ status: novoStatus })
                .eq('id', id)
                .eq('clinica', usuarioAtual.clinicaNome);
            
            if(error) throw error;
            
            alert(`Status atualizado para: ${novoStatus}`);
            await carregarOS();
        } catch(err) {
            console.error("Erro ao atualizar:", err);
            alert("Erro ao atualizar status: " + err.message);
        }
    }

    // FUNÇÃO PARA EXCLUIR OS
    async function excluirOS(id) {
        if(!confirm("Tem certeza que deseja excluir esta OS permanentemente?")) return;
        if(!supabaseClient) return;
        
        try {
            const { error } = await supabaseClient
                .from('chamados')
                .delete()
                .eq('id', id)
                .eq('clinica', usuarioAtual.clinicaNome);
            
            if(error) throw error;
            
            alert("OS excluída com sucesso!");
            await carregarOS();
        } catch(err) {
            console.error("Erro ao excluir:", err);
            alert("Erro ao excluir OS: " + err.message);
        }
    }
    // FUNÇÃO PARA VISUALIZAR OS (DETALHES)
    function visualizarOS(os) {
        let msg = "📋 ORDEM DE SERVIÇO\n";
        msg += "━━━━━━━━━━━━━━━━━━━━━━\n";
        msg += `Equipamento: ${os.equipamento}\n`;
        msg += `Prioridade: ${os.prioridade}\n`;
        msg += `Status: ${os.status}\n`;
        msg += `Data: ${new Date(os.created_at).toLocaleDateString('pt-BR')}\n`;
        msg += `Observações: ${os.detalhe || 'Nenhuma'}\n`;
        msg += `Laudo: ${os.incluirlaudo ? 'Solicitado' : 'Não solicitado'}\n`;
        if(os.data_agendamento) {
            msg += `Agendamento: ${new Date(os.data_agendamento).toLocaleDateString('pt-BR')}\n`;
        }
        msg += "━━━━━━━━━━━━━━━━━━━━━━\n";
        msg += "ONS OdontoTecnica";
        
        alert(msg);
    }

        texto += `*Telefone:* ${usuarioAtual.telefone}\n`;
        texto += `*Equipamento:* ${os.equipamento}\n`;
        texto += `*Prioridade:* ${os.prioridade}\n`;
        texto += `*Status:* ${os.status}\n`;
        texto += `*Data Abertura:* ${new Date(os.created_at).toLocaleDateString('pt-BR')}\n`;
        
        if(os.data_agendamento) {
            texto += `*Data Agendamento:* ${new Date(os.data_agendamento).toLocaleDateString('pt-BR')}\n`;
        }
        
        texto += `*Observações:* ${os.detalhe || 'Nenhuma'}\n`;
        texto += `*Laudo Técnico:* ${os.incluirlaudo ? 'Solicitado' : 'Não solicitado'}\n\n`;
        texto += `🔗 *Protocolo:* OS-${os.id}\n\n`;
        texto += `---\nONS OdontoTecnica - Manutenção de Qualidade`;
        
        let telefone = "35920004813";
        let url = `https://wa.me/55${telefone}?text=${encodeURIComponent(texto)}`;
        window.open(url, '_blank');
    }

    // FUNÇÃO PARA RENDERIZAR RELATÓRIOS
    function renderRelatorios() {
        const container = document.getElementById('listaOSContainer');
        if(!container) return;
        
        if(ordensServico.length === 0) {
            container.innerHTML = '<div class="card" style="text-align:center; color:#8a9aa5;">Nenhuma ordem de serviço registrada.</div>';
            return;
        }
        
        let html = '';
        ordensServico.forEach(os => {
            let statusClass = '';
            if(os.status === 'Aberto') statusClass = 'status-aberto';
            else if(os.status === 'Em andamento') statusClass = 'status-em-andamento';
            else statusClass = 'status-finalizado';
            
            html += `
                <div class="os-item-compact" data-id="${os.id}">
                    <div class="os-header-line">
                        <span class="os-equipamento">${os.equipamento ? (os.equipamento.length > 35 ? os.equipamento.substring(0,32)+'...' : os.equipamento) : 'N/A'}</span>
                        <span class="status-badge ${statusClass}">${os.status || 'Em andamento'}</span>
                    </div>
                    <div class="os-info-mini">
                        <span>📅 ${os.created_at ? new Date(os.created_at).toLocaleDateString('pt-BR') : 'N/A'}</span>
                        <span>⚠️ ${os.prioridade || 'Normal'}</span>
                        <span>📝 ${os.detalhe ? os.detalhe.substring(0, 30) : '---'}</span>
                    </div>
                    <div class="os-actions-compact">
                        <button class="small-btn verOS" onclick='visualizarOS(${JSON.stringify(os).replace(/'/g, "&#39;")})'>👁️ Visualizar</button>
                        <button class="small-btn excluirOS" onclick="excluirOS(${os.id})">🗑️ Excluir</button>
                        <button class="small-btn whatsOS" onclick='enviarOSWhatsApp(${JSON.stringify(os).replace(/'/g, "&#39;")})'>📱 WhatsApp</button>
                        ${os.status !== 'Finalizado' ? `<button class="small-btn finalizarOS" onclick="atualizarStatus(${os.id}, 'Finalizado')">✅ Finalizar</button>` : ''}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // VERIFICAR USUÁRIO AO CARREGAR
    const storedUser = localStorage.getItem('ons_usuario');
    if(storedUser) {
        usuarioAtual = JSON.parse(storedUser);
        document.getElementById('loginArea').classList.add('hidden');
        document.getElementById('mainSystem').classList.remove('hidden');
        document.getElementById('displayNomeClinica').innerHTML = usuarioAtual.clinicaNome + '<br><small>' + usuarioAtual.telefone + '</small>';
        carregarOS();
    }
</script>
