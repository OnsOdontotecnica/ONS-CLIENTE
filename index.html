<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ONS OdontoTecnica - Cliente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .app-container { max-width: 768px; margin: 0 auto; background: #f5f5f5; min-height: 100vh; }
        .header { background: #1a3a4f; padding: 20px 16px; border-radius: 0 0 25px 25px; margin-bottom: 15px; }
        .logo-title h1 { color: #f5b042; font-size: 1.4rem; }
        .logo-title p { color: rgba(245,176,66,0.85); font-size: 0.7rem; }
        .user-info { background: rgba(245,176,66,0.15); padding: 6px 12px; border-radius: 25px; display: flex; align-items: center; gap: 10px; color: #f5b042; }
        .logout-btn { background: rgba(245,176,66,0.25); border: none; color: #f5b042; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .nav-tabs { display: flex; background: white; margin: 12px 15px; border-radius: 40px; padding: 4px; }
        .tab-btn { flex: 1; text-align: center; padding: 10px; background: transparent; border: none; border-radius: 35px; cursor: pointer; font-weight: 600; color: #6b7a85; }
        .tab-btn.active { background: #1a3a4f; color: #f5b042; }
        .tab-content { display: none; padding: 16px 15px 25px; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .field-group { margin-bottom: 18px; }
        label { font-size: 0.75rem; font-weight: 700; color: #1a3a4f; display: block; margin-bottom: 6px; }
        select, input, textarea { width: 100%; padding: 12px; border: 1.5px solid #e0e6ea; border-radius: 14px; font-size: 0.85rem; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #f5b042; }
        .btn-primary { background: #1a3a4f; color: #f5b042; border: none; padding: 14px; width: 100%; border-radius: 35px; font-weight: 700; cursor: pointer; }
        .btn-secondary { background: #fef5e8; color: #1a3a4f; border: 1.5px solid #f5b042; padding: 12px; width: 100%; border-radius: 35px; cursor: pointer; margin-top: 10px; }
        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .checkbox-item { background: #f8f9fa; padding: 8px 14px; border-radius: 25px; display: flex; align-items: center; gap: 8px; border: 1px solid #e0e6ea; cursor: pointer; }
        .checkbox-item input { width: 18px; height: 18px; accent-color: #f5b042; }
        .os-item-compact { background: white; border-radius: 16px; padding: 14px; margin-bottom: 12px; border-left: 4px solid #f5b042; }
        .os-header-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
        .status-badge { font-size: 0.65rem; padding: 4px 12px; border-radius: 25px; font-weight: 700; }
        .status-aberto { background: #fef5e8; color: #f5b042; border: 1px solid #f5b042; }
        .status-finalizado { background: #e8f0f5; color: #1a3a4f; border: 1px solid #1a3a4f30; }
        .status-andamento { background: #e3f2fd; color: #1976d2; border: 1px solid #1976d2; }
        .small-btn { background: #f0f2f5; border: none; padding: 6px 14px; border-radius: 25px; cursor: pointer; font-size: 0.7rem; margin-right: 6px; margin-top: 6px; }
        .login-screen { padding: 30px 20px; min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #1a3a4f 0%, #0f2c3b 100%); }
        .login-card { background: white; border-radius: 32px; padding: 40px 28px; max-width: 400px; margin: 0 auto; }
        .login-logo { text-align: center; margin-bottom: 35px; }
        .login-logo h1 { color: #1a3a4f; font-size: 2.2rem; }
        .login-logo .logo-accent { color: #f5b042; font-size: 0.9rem; }
        .hidden { display: none !important; }
        .footer { text-align: center; font-size: 0.6rem; padding: 20px; color: #8a9aa5; }
        .error-msg { color: #d32f2f; font-size: 0.7rem; margin-top: 10px; text-align: center; }
        .admin-response { background: #e8f0f5; padding: 10px; border-radius: 12px; margin-top: 8px; font-size: 0.7rem; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .laudo-badge { background: #fef5e8; color: #f5b042; padding: 2px 8px; border-radius: 12px; font-size: 0.6rem; margin-left: 5px; }
    </style>
</head>
<body>
<div class="app-container">
    <div id="loginArea" class="login-screen">
        <div class="login-card">
            <div class="login-logo">
                <h1>ONS</h1>
                <div class="logo-accent">OdontoTecnica</div>
                <p style="font-size:0.7rem; color:#6b7a85; margin-top: 10px;">Manutenção de Equipamentos</p>
            </div>
            <div class="field-group">
                <label>Clínica / Consultório</label>
                <input type="text" id="loginClinica" placeholder="Ex: Sorriso Odonto">
            </div>
            <div class="field-group">
                <label>Telefone (com DDD)</label>
                <input type="tel" id="loginTelefone" placeholder="(11) 91234-5678">
            </div>
            <button class="btn-primary" id="btnLogin">🔐 Acessar Sistema</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <div id="mainSystem" class="hidden">
        <div class="header">
            <div class="header-flex">
                <div class="logo-title">
                    <h1>⚙️ ONS ODONTOTECNICA</h1>
                    <p>Ordem de Serviço • Suporte 24h</p>
                </div>
                <div class="user-info">
                    <span id="displayNomeClinica"></span>
                    <button class="logout-btn" id="logoutBtn">🚪 Sair</button>
                </div>
            </div>
        </div>

        <div class="nav-tabs">
            <button class="tab-btn active" data-tab="tabNovaOS">📝 Nova OS</button>
            <button class="tab-btn" data-tab="tabRelatorios">📋 Meus Chamados</button>
            <button class="tab-btn" data-tab="tabRespostas">💬 Respostas</button>
        </div>

        <div id="tabNovaOS" class="tab-content active">
            <div class="card">
                <div class="field-group">
                    <label>🔧 Equipamento</label>
                    <select id="equipamentoSelect">
                        <option value="">Selecione um equipamento</option>
                        <option>Cadeira Odontológica</option>
                        <option>Caneta Alta Rotação</option>
                        <option>Caneta Baixa Rotação</option>
                        <option>Micromotor Elétrico</option>
                        <option>Ultrassom Odontológico</option>
                        <option>Compressor</option>
                        <option>Aspirador / Suctora</option>
                        <option>Fotopolimerizadora</option>
                        <option>Raio-X Intraoral</option>
                        <option>Autoclave</option>
                        <option>Outros</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>📝 Observação do equipamento</label>
                    <textarea id="obsEquipamento" rows="2" placeholder="Detalhes adicionais..."></textarea>
                </div>
                <div class="field-group">
                    <label>⚡ Prioridade</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Alta"> 🔴 Alta</label>
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Média"> 🟡 Média</label>
                        <label class="checkbox-item"><input type="checkbox" name="prioridade" value="Baixa"> 🟢 Baixa</label>
                    </div>
                </div>
                <div class="field-group">
                    <label class="checkbox-item"><input type="checkbox" id="incluirLaudo"> 📄 Incluir laudo técnico</label>
                </div>
                <div class="field-group">
                    <label>📋 Observações gerais</label>
                    <textarea id="observacoesGerais" rows="2" placeholder="Informações adicionais..."></textarea>
                </div>
                <button class="btn-primary" id="btnCriarOS">✅ Criar Ordem de Serviço</button>
                <button class="btn-secondary" id="btnWhatsAppRapido">📱 Enviar via WhatsApp</button>
            </div>
        </div>

        <div id="tabRelatorios" class="tab-content">
            <div id="listaOSContainer"></div>
        </div>

        <div id="tabRespostas" class="tab-content">
            <div id="respostasContainer"></div>
        </div>

        <div class="footer">ONS OdontoTecnica • Qualidade em Manutenção</div>
    </div>
</div>

<script>
    (function() {
        console.log('🚀 ONS OdontoTecnica Cliente');
        
        const SUPABASE_URL = 'https://npfbnfubnyndachmdgzy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wZmJuZnVibnluZGFjaG1kZ3p5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjQ5ODksImV4cCI6MjA5MTEwMDk4OX0.bTKgcUAKt_2A4FcVJSEOZ2rEVNpGxCj8bHpXw0Lh7Vw';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let ordensServico = [];
        let usuarioAtual = null;
        let colunasDisponiveis = [];

        // VERIFICAR QUAIS COLUNAS EXISTEM NA TABELA
        async function verificarColunas() {
            try {
                const { data, error } = await supabaseClient
                    .from('chamados')
                    .select('*')
                    .limit(1);
                
                if (data && data.length > 0) {
                    colunasDisponiveis = Object.keys(data[0]);
                } else if (error && error.message.includes('column')) {
                    // Tabela vazia, vamos tentar inserir um registro temporário
                    console.log('Tabela vazia, tentando descobrir colunas...');
                }
                console.log('Colunas disponíveis:', colunasDisponiveis);
            } catch (e) {
                console.error('Erro ao verificar colunas:', e);
            }
        }

        function salvarUsuario() {
            if (usuarioAtual) {
                localStorage.setItem('usuario_ons', JSON.stringify(usuarioAtual));
            } else {
                localStorage.removeItem('usuario_ons');
            }
        }

        function carregarUsuarioSalvo() {
            const salvo = localStorage.getItem('usuario_ons');
            if (salvo) {
                try {
                    usuarioAtual = JSON.parse(salvo);
                    return true;
                } catch(e) { console.error(e); }
            }
            return false;
        }

        function atualizarInterface() {
            const loginDiv = document.getElementById('loginArea');
            const mainDiv = document.getElementById('mainSystem');
            const displayNome = document.getElementById('displayNomeClinica');

            if (usuarioAtual && usuarioAtual.clinicaNome) {
                loginDiv.classList.add('hidden');
                mainDiv.classList.remove('hidden');
                displayNome.innerHTML = `🏥 ${usuarioAtual.clinicaNome} | 📞 ${usuarioAtual.telefone}`;
                carregarOS();
                carregarRespostas();
            } else {
                loginDiv.classList.remove('hidden');
                mainDiv.classList.add('hidden');
            }
        }

        async function carregarOS() {
            if (!usuarioAtual) return;
            
            const { data, error } = await supabaseClient
                .from('chamados')
                .select('*')
                .eq('clinica', usuarioAtual.clinicaNome)
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            ordensServico = data || [];
            renderRelatorios();
        }

        async function carregarRespostas() {
            if (!usuarioAtual) return;
            
            const { data, error } = await supabaseClient
                .from('chamados')
                .select('id, equipamento, admin_response, created_at, status')
                .eq('clinica', usuarioAtual.clinicaNome)
                .not('admin_response', 'is', null)
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error(error);
                return;
            }
            
            renderRespostas(data || []);
        }

        // CRIAR OS - Versão adaptativa (só envia colunas que existem)
        async function criarOS() {
            if (!usuarioAtual) {
                alert('Faça login primeiro!');
                return;
            }
            
            let eqBase = document.getElementById('equipamentoSelect').value;
            let obsEquip = document.getElementById('obsEquipamento').value;
            let equipamentoFinal = obsEquip.trim() ? (eqBase ? eqBase + ' (' + obsEquip + ')' : obsEquip) : eqBase;
            if (!equipamentoFinal) equipamentoFinal = "Não informado";
            
            let prioridades = [];
            document.querySelectorAll('input[name="prioridade"]:checked').forEach(cb => prioridades.push(cb.value));
            let prioridadeTxt = prioridades.length ? prioridades.join(', ') : "Normal";
            
            let obsGerais = document.getElementById('observacoesGerais').value || "---";
            let incluirLaudo = document.getElementById('incluirLaudo').checked;
            
            const btn = document.getElementById('btnCriarOS');
            btn.disabled = true;
            btn.innerText = "⏳ Enviando...";

            try {
                // Construir objeto apenas com colunas que existem
                let novoChamado = {
                    clinica: usuarioAtual.clinicaNome,
                    equipamento: equipamentoFinal,
                    prioridade: prioridadeTxt,
                    detalhe: obsGerais,
                    status: 'Aberto'
                };
                
                // Só adicionar telefone_cliente se a coluna existir
                if (colunasDisponiveis.includes('telefone_cliente')) {
                    novoChamado.telefone_cliente = usuarioAtual.telefone;
                }
                
                // Só adicionar incluirLaudo se a coluna existir
                if (colunasDisponiveis.includes('incluirLaudo')) {
                    novoChamado.incluirLaudo = incluirLaudo;
                } else {
                    console.log('Coluna incluirLaudo não existe, ignorando...');
                }

                const { error } = await supabaseClient.from('chamados').insert([novoChamado]);

                if (error) throw error;

                alert("✅ Chamado enviado com sucesso!");
                
                // Limpar formulário
                document.getElementById('obsEquipamento').value = "";
                document.getElementById('observacoesGerais').value = "";
                document.getElementById('incluirLaudo').checked = false;
                document.querySelectorAll('input[name="prioridade"]').forEach(cb => cb.checked = false);
                document.getElementById('equipamentoSelect').value = "";
                
                await carregarOS();
                await carregarRespostas();

            } catch (err) {
                console.error(err);
                alert("Erro ao salvar: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "✅ Criar Ordem de Serviço";
            }
        }

        async function finalizarOS(id) {
            if (!confirm('✅ Confirmar que este serviço foi concluído?')) return;
            
            let updateData = { status: 'Finalizado' };
            
            if (colunasDisponiveis.includes('dataFinalizacao')) {
                updateData.dataFinalizacao = new Date().toISOString();
            }
            
            const { error } = await supabaseClient
                .from('chamados')
                .update(updateData)
                .eq('id', id);
            
            if (error) {
                alert("Erro ao finalizar: " + error.message);
                return;
            }
            
            alert("✅ OS finalizada!");
            await carregarOS();
        }

        async function excluirOS(id) {
            if (!confirm('⚠️ Tem certeza que deseja EXCLUIR esta OS?')) return;
            
            const { error } = await supabaseClient
                .from('chamados')
                .delete()
                .eq('id', id);
            
            if (error) {
                alert("Erro ao excluir: " + error.message);
                return;
            }
            
            alert("🗑️ OS excluída!");
            await carregarOS();
            await carregarRespostas();
        }

        function visualizarOS(id) {
            const os = ordensServico.find(o => o.id === id);
            if (!os) return;
            
            let msg = "📋 DETALHES DA OS\n\n";
            msg += "ID: " + os.id + "\n";
            msg += "Clínica: " + os.clinica + "\n";
            msg += "Data: " + new Date(os.created_at).toLocaleString() + "\n";
            msg += "Status: " + os.status + "\n";
            msg += "Equipamento: " + os.equipamento + "\n";
            msg += "Prioridade: " + os.prioridade + "\n";
            if (os.incluirLaudo !== undefined) msg += "Laudo: " + (os.incluirLaudo ? "✅ Sim" : "❌ Não") + "\n";
            msg += "Observações: " + (os.detalhe || "---") + "\n";
            if (os.admin_response) msg += "\n💬 RESPOSTA DA ONS:\n" + os.admin_response + "\n";
            alert(msg);
        }

        function enviarWhatsApp(id) {
            const os = ordensServico.find(o => o.id === id);
            if (!os) return;
            
            let texto = `🏥 ONS ODONTOTECNICA - ORDEM DE SERVIÇO #${os.id}\n\n` +
                `Cliente: ${os.clinica}\n` +
                `Equipamento: ${os.equipamento}\n` +
                `Prioridade: ${os.prioridade}\n` +
                `Observações: ${os.detalhe || '---'}\n\n` +
                `Status: ${os.status}`;
            
            if (os.incluirLaudo !== undefined) {
                texto += `\nLaudo: ${os.incluirLaudo ? 'Sim' : 'Não'}`;
            }
            
            const url = "https://wa.me/5535920004813?text=" + encodeURIComponent(texto);
            window.open(url, '_blank');
        }

        function renderRelatorios() {
            const container = document.getElementById('listaOSContainer');
            if (!container) return;
            
            if (ordensServico.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;">📭 Nenhum chamado encontrado.</div>';
                return;
            }
            
            let html = '';
            ordensServico.forEach(os => {
                let statusClass = 'status-aberto';
                if (os.status === 'Finalizado') statusClass = 'status-finalizado';
                if (os.status === 'Em andamento') statusClass = 'status-andamento';
                
                const laudoHtml = (os.incluirLaudo !== undefined && os.incluirLaudo) ? '<span class="laudo-badge">📄 Laudo</span>' : '';
                
                html += `
                    <div class="os-item-compact">
                        <div class="os-header-line">
                            <strong>🔧 ${os.equipamento.substring(0, 35)}</strong>
                            <span class="status-badge ${statusClass}">${os.status} ${laudoHtml}</span>
                        </div>
                        <div style="font-size:0.7rem; margin:5px 0;">
                            📅 ${new Date(os.created_at).toLocaleDateString()} | ⚡ ${os.prioridade}
                        </div>
                        ${os.admin_response ? `<div class="admin-response">💬 Resposta: ${os.admin_response.substring(0, 80)}${os.admin_response.length > 80 ? '...' : ''}</div>` : ''}
                        <div>
                            <button class="small-btn" onclick="window.visualizarOS(${os.id})">👁️ Ver</button>
                            <button class="small-btn" onclick="window.enviarWhatsApp(${os.id})">📱 WhatsApp</button>
                            ${os.status === 'Aberto' || os.status === 'Em andamento' ? `<button class="small-btn" onclick="window.finalizarOS(${os.id})">✅ Finalizar</button>` : ''}
                            <button class="small-btn" onclick="window.excluirOS(${os.id})">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderRespostas(respostas) {
            const container = document.getElementById('respostasContainer');
            if (!container) return;
            
            if (respostas.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;">💬 Nenhuma resposta da ONS ainda. Aguarde o contato do técnico.</div>';
                return;
            }
            
            let html = '';
            respostas.forEach(resp => {
                html += `
                    <div class="os-item-compact">
                        <div class="os-header-line">
                            <strong>📝 Chamado #${resp.id} - ${resp.equipamento.substring(0, 30)}</strong>
                            <span class="status-badge ${resp.status === 'Finalizado' ? 'status-finalizado' : 'status-andamento'}">${resp.status}</span>
                        </div>
                        <div style="font-size:0.7rem; margin:5px 0;">
                            📅 ${new Date(resp.created_at).toLocaleString()}
                        </div>
                        <div class="admin-response" style="background: #fef5e8;">
                            💬 <strong>Resposta da ONS:</strong><br>
                            ${resp.admin_response}
                        </div>
                        <div style="margin-top: 10px;">
                            <button class="small-btn" onclick="window.enviarWhatsApp(${resp.id})">📱 Responder via WhatsApp</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function fazerLogin() {
            const clinica = document.getElementById('loginClinica').value.trim();
            const telefone = document.getElementById('loginTelefone').value.trim();
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.innerHTML = '';
            
            if (!clinica) {
                errorDiv.innerHTML = '❌ Preencha o nome da clínica';
                return;
            }
            if (!telefone) {
                errorDiv.innerHTML = '❌ Preencha o telefone';
                return;
            }
            
            usuarioAtual = { clinicaNome: clinica, telefone: telefone };
            salvarUsuario();
            atualizarInterface();
        }

        function fazerLogout() {
            usuarioAtual = null;
            salvarUsuario();
            atualizarInterface();
        }

        function iniciarTabs() {
            const botoes = document.querySelectorAll('.tab-btn');
            botoes.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabId = btn.getAttribute('data-tab');
                    botoes.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    document.getElementById(tabId).classList.add('active');
                    if (tabId === 'tabRelatorios') renderRelatorios();
                    if (tabId === 'tabRespostas') carregarRespostas();
                });
            });
        }

        window.visualizarOS = visualizarOS;
        window.enviarWhatsApp = enviarWhatsApp;
        window.finalizarOS = finalizarOS;
        window.excluirOS = excluirOS;

        document.addEventListener('DOMContentLoaded', async () => {
            await verificarColunas();
            carregarUsuarioSalvo();
            
            document.getElementById('btnLogin').addEventListener('click', fazerLogin);
            document.getElementById('logoutBtn').addEventListener('click', fazerLogout);
            document.getElementById('btnCriarOS').addEventListener('click', criarOS);
            document.getElementById('btnWhatsAppRapido').addEventListener('click', () => {
                if (ordensServico.length > 0) {
                    enviarWhatsApp(ordensServico[0].id);
                } else {
                    alert('📭 Nenhuma OS para enviar');
                }
            });
            
            iniciarTabs();
            atualizarInterface();
            
            setInterval(() => {
                if (usuarioAtual) {
                    carregarRespostas();
                    carregarOS();
                }
            }, 30000);
        });
    })();
</script>
</body>
</html>
